<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livo</title>
    <style>
      /* Titlebar drag region */
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
    <script>
      // Detect theme BEFORE any paint to avoid FOUC.
      // Mirrors the theme detection that React would do, so the skeleton
      // renders in the correct color scheme from the very first frame.
      (function () {
        try {
          var stored = localStorage.getItem('livo-theme')
          if (stored === '"dark"' || stored === 'dark') {
            document.documentElement.classList.add('dark')
          } else if (stored === '"light"' || stored === 'light') {
            document.documentElement.classList.remove('dark')
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <!--
      Inline HTML/CSS skeleton — renders INSTANTLY (zero JS) while React boots.
      Matches the final layout: sidebar (240px) + entry list (384px) + content area.
      React calls removeAppSkeleton() when the app is ready.
    -->
    <div id="app-skeleton">
      <style>
        /* Skeleton theme tokens — must be self-contained (no Tailwind dependency) */
        :root {
          --livo-skel-bg: #ffffff;
          --livo-skel-sidebar: #f5f5f7;
          --livo-skel-border: #d2d2d7;
          --livo-skel-pulse-from: #e5e5ea;
          --livo-skel-pulse-to: #f0f0f5;
        }
        :root.dark {
          --livo-skel-bg: #1c1c1e;
          --livo-skel-sidebar: #1c1c1e;
          --livo-skel-border: #38383a;
          --livo-skel-pulse-from: #2c2c2e;
          --livo-skel-pulse-to: #3a3a3c;
        }

        html, body, #root, #app-skeleton {
          height: 100%;
          width: 100%;
          margin: 0;
          padding: 0;
        }

        #app-skeleton {
          position: fixed;
          inset: 0;
          z-index: 1000;
          display: flex;
          font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI',
            Roboto, 'Helvetica Neue', sans-serif;
        }

        /* Sidebar (240px) */
        .livo-skel-sidebar {
          width: 240px;
          flex-shrink: 0;
          background: var(--livo-skel-sidebar);
          border-right: 1px solid var(--livo-skel-border);
          display: flex;
          flex-direction: column;
        }

        /* Sidebar header */
        .livo-skel-sidebar-header {
          height: 56px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 16px;
          border-bottom: 1px solid var(--livo-skel-border);
        }

        /* Sidebar tabs row */
        .livo-skel-sidebar-tabs {
          display: flex;
          gap: 8px;
          padding: 12px 16px;
          border-bottom: 1px solid var(--livo-skel-border);
        }

        /* Sidebar feed list */
        .livo-skel-sidebar-feeds {
          flex: 1;
          padding: 8px;
          display: flex;
          flex-direction: column;
          gap: 2px;
        }

        .livo-skel-feed-item {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 8px 12px;
          border-radius: 8px;
        }

        /* Entry list (384px) */
        .livo-skel-entry-list {
          width: 384px;
          flex-shrink: 0;
          background: var(--livo-skel-bg);
          border-right: 1px solid var(--livo-skel-border);
          display: flex;
          flex-direction: column;
        }

        .livo-skel-entry-header {
          height: 56px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 16px;
          border-bottom: 1px solid var(--livo-skel-border);
        }

        .livo-skel-entries {
          flex: 1;
          display: flex;
          flex-direction: column;
        }

        .livo-skel-entry {
          padding: 16px;
          border-bottom: 1px solid var(--livo-skel-border);
        }

        /* Content area (flex-1) */
        .livo-skel-content {
          flex: 1;
          background: var(--livo-skel-bg);
          padding: 32px 48px;
          display: flex;
          justify-content: center;
        }

        .livo-skel-content-inner {
          max-width: 720px;
          width: 100%;
        }

        /* Pulse animation */
        @keyframes livo-skel-pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }

        .livo-skel-pulse {
          background: var(--livo-skel-pulse-from);
          border-radius: 4px;
          animation: livo-skel-pulse 1.8s ease-in-out infinite;
        }

        /* Shared dimension helpers */
        .livo-skel-h-5 { height: 20px; }
        .livo-skel-h-3 { height: 12px; }
        .livo-skel-h-2 { height: 8px; }
        .livo-skel-h-8 { height: 32px; }
        .livo-skel-h-9 { height: 36px; }
        .livo-skel-h-6 { height: 24px; }

        .livo-skel-w-20 { width: 80px; }
        .livo-skel-w-16 { width: 64px; }
        .livo-skel-w-32 { width: 128px; }
        .livo-skel-w-24 { width: 96px; }

        .livo-skel-w-3-4 { width: 75%; }
        .livo-skel-w-5-6 { width: 83.3%; }
        .livo-skel-w-full { width: 100%; }

        .livo-skel-rounded { border-radius: 4px; }
        .livo-skel-rounded-full { border-radius: 9999px; }

        .livo-skel-mb-2 { margin-bottom: 8px; }
        .livo-skel-mb-3 { margin-bottom: 12px; }
        .livo-skel-mb-6 { margin-bottom: 24px; }
        .livo-skel-mt-4 { margin-top: 16px; }

        .livo-skel-gap-2 { gap: 8px; }
        .livo-skel-gap-3 { gap: 12px; }
        .livo-skel-flex { display: flex; }
        .livo-skel-flex-col { display: flex; flex-direction: column; }
        .livo-skel-items-center { align-items: center; }
      </style>

      <!-- Sidebar -->
      <div class="livo-skel-sidebar">
        <div class="livo-skel-sidebar-header">
          <div class="livo-skel-pulse livo-skel-h-5 livo-skel-w-20 livo-skel-rounded"></div>
          <div class="livo-skel-pulse livo-skel-h-8 livo-skel-rounded" style="width:32px"></div>
        </div>
        <div class="livo-skel-sidebar-tabs">
          <div class="livo-skel-pulse livo-skel-h-8 livo-skel-w-16 livo-skel-rounded" style="animation-delay:0.1s"></div>
          <div class="livo-skel-pulse livo-skel-h-8 livo-skel-w-16 livo-skel-rounded" style="animation-delay:0.2s"></div>
          <div class="livo-skel-pulse livo-skel-h-8 livo-skel-w-16 livo-skel-rounded" style="animation-delay:0.3s"></div>
          <div class="livo-skel-pulse livo-skel-h-8 livo-skel-w-16 livo-skel-rounded" style="animation-delay:0.4s"></div>
        </div>
        <div class="livo-skel-sidebar-feeds">
          <div class="livo-skel-feed-item">
            <div class="livo-skel-pulse livo-skel-h-9 livo-skel-rounded-full" style="width:36px;animation-delay:0.08s"></div>
            <div class="livo-skel-flex-col livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded" style="width:120px;animation-delay:0.08s"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:80px;animation-delay:0.13s;opacity:0.6"></div>
            </div>
          </div>
          <div class="livo-skel-feed-item">
            <div class="livo-skel-pulse livo-skel-h-9 livo-skel-rounded-full" style="width:36px;animation-delay:0.16s"></div>
            <div class="livo-skel-flex-col livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded" style="width:100px;animation-delay:0.16s"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:60px;animation-delay:0.21s;opacity:0.6"></div>
            </div>
          </div>
          <div class="livo-skel-feed-item">
            <div class="livo-skel-pulse livo-skel-h-9 livo-skel-rounded-full" style="width:36px;animation-delay:0.24s"></div>
            <div class="livo-skel-flex-col livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded" style="width:140px;animation-delay:0.24s"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:70px;animation-delay:0.29s;opacity:0.6"></div>
            </div>
          </div>
          <div class="livo-skel-feed-item">
            <div class="livo-skel-pulse livo-skel-h-9 livo-skel-rounded-full" style="width:36px;animation-delay:0.32s"></div>
            <div class="livo-skel-flex-col livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded" style="width:90px;animation-delay:0.32s"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:50px;animation-delay:0.37s;opacity:0.6"></div>
            </div>
          </div>
          <div class="livo-skel-feed-item">
            <div class="livo-skel-pulse livo-skel-h-9 livo-skel-rounded-full" style="width:36px;animation-delay:0.40s"></div>
            <div class="livo-skel-flex-col livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded" style="width:110px;animation-delay:0.40s"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:65px;animation-delay:0.45s;opacity:0.6"></div>
            </div>
          </div>
          <div class="livo-skel-feed-item">
            <div class="livo-skel-pulse livo-skel-h-9 livo-skel-rounded-full" style="width:36px;animation-delay:0.48s"></div>
            <div class="livo-skel-flex-col livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded" style="width:130px;animation-delay:0.48s"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:75px;animation-delay:0.53s;opacity:0.6"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Entry list -->
      <div class="livo-skel-entry-list">
        <div class="livo-skel-entry-header">
          <div class="livo-skel-pulse livo-skel-h-6 livo-skel-w-32 livo-skel-rounded"></div>
          <div class="livo-skel-pulse livo-skel-h-8 livo-skel-rounded" style="width:32px"></div>
        </div>
        <div class="livo-skel-entries">
          <div class="livo-skel-entry">
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-mb-2" style="width:85%;animation-delay:0.1s"></div>
            <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded livo-skel-mb-2" style="width:95%;animation-delay:0.15s;opacity:0.6"></div>
            <div class="livo-skel-flex livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:64px;animation-delay:0.2s;opacity:0.5"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:80px;animation-delay:0.25s;opacity:0.5"></div>
            </div>
          </div>
          <div class="livo-skel-entry">
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-mb-2" style="width:70%;animation-delay:0.2s"></div>
            <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded livo-skel-mb-2" style="width:90%;animation-delay:0.25s;opacity:0.6"></div>
            <div class="livo-skel-flex livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:56px;animation-delay:0.3s;opacity:0.5"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:70px;animation-delay:0.35s;opacity:0.5"></div>
            </div>
          </div>
          <div class="livo-skel-entry">
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-mb-2" style="width:90%;animation-delay:0.3s"></div>
            <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded livo-skel-mb-2" style="width:80%;animation-delay:0.35s;opacity:0.6"></div>
            <div class="livo-skel-flex livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:72px;animation-delay:0.4s;opacity:0.5"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:60px;animation-delay:0.45s;opacity:0.5"></div>
            </div>
          </div>
          <div class="livo-skel-entry">
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-mb-2" style="width:75%;animation-delay:0.4s"></div>
            <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded livo-skel-mb-2" style="width:85%;animation-delay:0.45s;opacity:0.6"></div>
            <div class="livo-skel-flex livo-skel-gap-2">
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:48px;animation-delay:0.5s;opacity:0.5"></div>
              <div class="livo-skel-pulse livo-skel-h-2 livo-skel-rounded" style="width:90px;animation-delay:0.55s;opacity:0.5"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Content area -->
      <div class="livo-skel-content">
        <div class="livo-skel-content-inner">
          <div class="livo-skel-pulse livo-skel-h-8 livo-skel-rounded livo-skel-w-3-4 livo-skel-mb-3"></div>
          <div class="livo-skel-flex livo-skel-gap-3 livo-skel-mb-6">
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-w-24" style="opacity:0.6"></div>
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-w-32" style="opacity:0.6"></div>
          </div>
          <div class="livo-skel-mt-4">
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-w-full livo-skel-mb-2" style="opacity:0.5;animation-delay:0.15s"></div>
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-w-full livo-skel-mb-2" style="opacity:0.5;animation-delay:0.2s"></div>
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-w-5-6 livo-skel-mb-6" style="opacity:0.5;animation-delay:0.25s"></div>
          </div>
          <div class="livo-skel-mt-4">
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-w-full livo-skel-mb-2" style="opacity:0.5;animation-delay:0.30s"></div>
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-w-full livo-skel-mb-2" style="opacity:0.5;animation-delay:0.35s"></div>
            <div class="livo-skel-pulse livo-skel-h-3 livo-skel-rounded livo-skel-w-3-4 livo-skel-mb-6" style="opacity:0.5;animation-delay:0.40s"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
