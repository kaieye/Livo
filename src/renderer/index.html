<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livo</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('livo-theme')
          if (stored === '"dark"' || stored === 'dark') {
            document.documentElement.classList.add('dark')
          } else if (stored === '"light"' || stored === 'light') {
            document.documentElement.classList.remove('dark')
          } else if (
            window.matchMedia('(prefers-color-scheme: dark)').matches
          ) {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="app-skeleton" aria-hidden="true">
      <style>
        :root {
          --livo-boot-bg: rgb(255 255 255);
          --livo-boot-sidebar: rgb(246 246 247);
          --livo-boot-entry: rgb(255 255 255);
          --livo-boot-content: rgb(250 250 251);
          --livo-boot-border: rgb(226 226 229);
        }

        :root.dark {
          --livo-boot-bg: rgb(28 28 30);
          --livo-boot-sidebar: rgb(28 28 30);
          --livo-boot-entry: rgb(28 28 30);
          --livo-boot-content: rgb(22 22 24);
          --livo-boot-border: rgb(56 56 58);
        }

        html,
        body,
        #root,
        #app-skeleton {
          height: 100%;
          width: 100%;
          margin: 0;
          padding: 0;
        }

        #app-skeleton {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          background: var(--livo-boot-bg);
          font-family:
            -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI',
            Roboto, 'Helvetica Neue', sans-serif;
        }

        .livo-boot-sidebar {
          width: 260px;
          flex: 0 0 260px;
          background: var(--livo-boot-sidebar);
          border-right: 1px solid var(--livo-boot-border);
        }

        .livo-boot-entry {
          width: 340px;
          flex: 0 0 340px;
          background: var(--livo-boot-entry);
          border-right: 1px solid var(--livo-boot-border);
        }

        .livo-boot-content {
          min-width: 0;
          flex: 1;
          background: var(--livo-boot-content);
        }
      </style>
      <div class="livo-boot-sidebar"></div>
      <div class="livo-boot-entry"></div>
      <div class="livo-boot-content"></div>
    </div>

    <div id="root" style="height: 100%; width: 100%"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
