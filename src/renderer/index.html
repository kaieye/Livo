<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livo</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('livo-theme')
          if (stored === '"dark"' || stored === 'dark') {
            document.documentElement.classList.add('dark')
          } else if (stored === '"light"' || stored === 'light') {
            document.documentElement.classList.remove('dark')
          } else if (
            window.matchMedia('(prefers-color-scheme: dark)').matches
          ) {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="app-skeleton" aria-hidden="true">
      <style>
        :root {
          --livo-boot-bg: rgb(255 255 255);
        }

        :root.dark {
          --livo-boot-bg: rgb(28 28 30);
        }

        html,
        body,
        #root,
        #app-skeleton {
          height: 100%;
          width: 100%;
          margin: 0;
          padding: 0;
        }

        #app-skeleton {
          position: fixed;
          inset: 0;
          z-index: 9999;
          background: var(--livo-boot-bg);
        }
      </style>
    </div>

    <div id="root" style="height: 100%; width: 100%"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
