name: Feature request
description: 提出产品或工程改进建议
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述当前体验或工程限制。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的行为或实现方向。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 已考虑但不采用的方案。
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: 补充信息
    validations:
      required: false
